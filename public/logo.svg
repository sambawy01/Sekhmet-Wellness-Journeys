<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="50%" style="stop-color:#C5A059"/>
      <stop offset="100%" style="stop-color:#A67C38"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="100%" style="stop-color:#A67C38"/>
    </linearGradient>
  </defs>

  <!-- Ankh Symbol -->
  <g transform="translate(200, 180)">
    <!-- Top circle/loop of ankh -->
    <circle cx="0" cy="-70" r="58" stroke="url(#gold)" stroke-width="12" fill="none"/>
    <circle cx="0" cy="-70" r="45" stroke="url(#gold)" stroke-width="4" fill="none" opacity="0.3"/>

    <!-- Lioness face inside the loop -->
    <!-- Ears -->
    <path d="M-22 -105 C-28 -118, -18 -125, -12 -115" stroke="url(#gold)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M22 -105 C28 -118, 18 -125, 12 -115" stroke="url(#gold)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <ellipse cx="-15" cy="-78" rx="7" ry="5" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
    <ellipse cx="15" cy="-78" rx="7" ry="5" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
    <circle cx="-15" cy="-78" r="2" fill="url(#gold)"/>
    <circle cx="15" cy="-78" r="2" fill="url(#gold)"/>

    <!-- Nose -->
    <path d="M-5 -65 L0 -60 L5 -65" stroke="url(#gold)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Mouth/muzzle -->
    <path d="M0 -60 L0 -55" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-8 -52 C-4 -48, 4 -48, 8 -52" stroke="url(#gold)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Whisker dots -->
    <circle cx="-20" cy="-58" r="1.2" fill="url(#gold)"/>
    <circle cx="-25" cy="-55" r="1.2" fill="url(#gold)"/>
    <circle cx="20" cy="-58" r="1.2" fill="url(#gold)"/>
    <circle cx="25" cy="-55" r="1.2" fill="url(#gold)"/>

    <!-- Cross arms (horizontal bar) -->
    <rect x="-48" y="-8" width="96" height="12" rx="4" fill="url(#gold)"/>

    <!-- Vertical shaft (below arms) -->
    <rect x="-7" y="4" width="14" height="100" rx="3" fill="url(#gold)"/>

    <!-- Connection from circle to arms -->
    <rect x="-7" y="-18" width="14" height="22" fill="url(#gold)"/>
  </g>

  <!-- SEKHMET Text -->
  <text x="200" y="380" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="56" font-weight="700" letter-spacing="8" fill="url(#goldText)">SEKHMET</text>

  <!-- WELLNESS JOURNEYS Text -->
  <text x="200" y="415" text-anchor="middle" font-family="'Outfit', 'Helvetica Neue', sans-serif" font-size="18" font-weight="400" letter-spacing="12" fill="url(#goldText)">WELLNESS JOURNEYS</text>
</svg>
