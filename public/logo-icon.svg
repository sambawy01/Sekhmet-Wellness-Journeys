<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A84B"/>
      <stop offset="50%" style="stop-color:#C5A059"/>
      <stop offset="100%" style="stop-color:#A67C38"/>
    </linearGradient>
  </defs>

  <g transform="translate(60, 68)">
    <!-- Top circle/loop of ankh -->
    <circle cx="0" cy="-35" r="30" stroke="url(#g)" stroke-width="7" fill="none"/>

    <!-- Lioness face inside the loop -->
    <!-- Ears -->
    <path d="M-11 -53 C-14 -60, -9 -63, -6 -58" stroke="url(#g)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M11 -53 C14 -60, 9 -63, 6 -58" stroke="url(#g)" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <ellipse cx="-8" cy="-40" rx="3.5" ry="2.5" stroke="url(#g)" stroke-width="1.5" fill="none"/>
    <ellipse cx="8" cy="-40" rx="3.5" ry="2.5" stroke="url(#g)" stroke-width="1.5" fill="none"/>
    <circle cx="-8" cy="-40" r="1" fill="url(#g)"/>
    <circle cx="8" cy="-40" r="1" fill="url(#g)"/>

    <!-- Nose -->
    <path d="M-2.5 -33 L0 -30.5 L2.5 -33" stroke="url(#g)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Mouth -->
    <path d="M0 -30.5 L0 -28" stroke="url(#g)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M-4 -26 C-2 -24, 2 -24, 4 -26" stroke="url(#g)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Cross arms -->
    <rect x="-25" y="-4" width="50" height="7" rx="2.5" fill="url(#g)"/>

    <!-- Vertical shaft -->
    <rect x="-4" y="3" width="8" height="55" rx="2" fill="url(#g)"/>

    <!-- Connection -->
    <rect x="-4" y="-9" width="8" height="12" fill="url(#g)"/>
  </g>
</svg>
